<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Танцующий персонаж</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 10;
        }
        button {
            background: #4488cc;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button.active {
            background: #ff8844;
            box-shadow: 0 0 15px #ff8844;
        }
        button:hover {
            background: #66aadd;
        }
        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 10px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="info">🤖 Робот-экспрессив | Крутите мышью</div>
    <div id="controls">
        <button id="btn-idle" class="active">😐 Покой</button>
        <button id="btn-walk">🚶 Ходьба</button>
        <button id="btn-run">🏃 Бег</button>
        <button id="btn-dance">💃 Танец</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ---------- Сцена ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
        camera.position.set(2, 2, 3.5);
        camera.lookAt(0, 1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1, 0);
        controls.enableDamping = true;
        controls.update();

        // ---------- Окружение ----------
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createLinearGradient(0, 0, 0, 256);
        grad.addColorStop(0, '#0a0a2a');
        grad.addColorStop(0.4, '#224466');
        grad.addColorStop(0.6, '#446688');
        grad.addColorStop(1, '#050510');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 512, 256);
        const envTexture = new THREE.CanvasTexture(canvas);
        envTexture.mapping = THREE.EquirectangularReflectionMapping;
        scene.environment = envTexture;

        // Освещение
        const ambient = new THREE.AmbientLight(0x445566, 1.2);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffffff, 6);
        dirLight.position.set(5, 10, 2);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.1;
        dirLight.shadow.camera.far = 30;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        scene.add(dirLight);

        const backLight = new THREE.PointLight(0x4466aa, 30);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);

        // Пол
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(8, 8),
            new THREE.MeshStandardMaterial({ color: 0x333344, metalness: 0.7, roughness: 0.15 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.5;
        floor.receiveShadow = true;
        scene.add(floor);

        // Звёзды
        const starsGeo = new THREE.BufferGeometry();
        const starsCount = 1000;
        const starsPos = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            const r = 15 + Math.random() * 10;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starsPos[i] = Math.cos(theta) * Math.sin(phi) * r;
            starsPos[i+1] = Math.sin(theta) * Math.sin(phi) * r * 0.5;
            starsPos[i+2] = Math.cos(phi) * r;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({
            color: 0xaaccff, size: 0.07, blending: THREE.AdditiveBlending, depthWrite: false
        })));

        // ---------- Загрузка модели и анимаций ----------
        const loader = new GLTFLoader();
        let mixer, animationsMap = new Map();
        let currentAction;

        loader.load(
            'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/models/gltf/RobotExpressive/RobotExpressive.glb',
            (gltf) => {
                const model = gltf.scene;
                model.position.set(0, 0, 0);
                model.scale.set(1, 1, 1);
                model.castShadow = true;
                model.receiveShadow = true;
                scene.add(model);

                // Animation mixer
                mixer = new THREE.AnimationMixer(model);
                gltf.animations.forEach((clip) => {
                    const action = mixer.clipAction(clip);
                    animationsMap.set(clip.name, action);
                    if (clip.name === 'Idle') currentAction = action; // покой по умолчанию
                });

                // Запускаем Idle
                if (currentAction) currentAction.play();
                
                // Назначим кнопки
                setupButtons();
                console.log('✅ Робот загружен, анимации:', [...animationsMap.keys()].join(', '));
            },
            (progress) => {
                const pct = (progress.loaded / progress.total * 100).toFixed(0);
                console.log(`Загрузка робота: ${pct}%`);
            },
            (error) => {
                console.error('❌ Ошибка загрузки:', error);
            }
        );

        // Переключение анимаций
        function switchAnimation(name) {
            const newAction = animationsMap.get(name);
            if (!newAction || newAction === currentAction) return;
            if (currentAction) currentAction.fadeOut(0.3);
            newAction.reset().fadeIn(0.3).play();
            currentAction = newAction;
        }

        function setupButtons() {
            const buttons = {
                idle: document.getElementById('btn-idle'),
                walk: document.getElementById('btn-walk'),
                run: document.getElementById('btn-run'),
                dance: document.getElementById('btn-dance'),
            };
            const setActive = (activeBtn) => {
                Object.values(buttons).forEach(b => b.classList.remove('active'));
                activeBtn.classList.add('active');
            };
            buttons.idle.addEventListener('click', () => { switchAnimation('Idle'); setActive(buttons.idle); });
            buttons.walk.addEventListener('click', () => { switchAnimation('Walk'); setActive(buttons.walk); });
            buttons.run.addEventListener('click', () => { switchAnimation('Run'); setActive(buttons.run); });
            buttons.dance.addEventListener('click', () => { switchAnimation('Dance'); setActive(buttons.dance); });
            setActive(buttons.idle);
        }

        // ---------- Анимация кадра ----------
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });
    </script>
</body>
</html>
