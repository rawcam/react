<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Вход · Sputnik Studio</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: black;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .login-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }
    .login-panel {
      background: rgba(15, 25, 40, 0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 36px 32px;
      width: 360px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(100, 150, 255, 0.3);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.08);
      pointer-events: auto;
      animation: fadeIn 0.8s ease-out;
      transition: background 0.3s ease, backdrop-filter 0.3s ease, box-shadow 0.3s ease;
    }
    .login-panel:hover {
      background: rgba(20, 35, 55, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(100, 150, 255, 0.6);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-panel h2 {
      margin: 0 0 8px 0;
      font-weight: 600;
      font-size: 28px;
      text-align: center;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a0c0ff, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .login-panel .subtitle {
      text-align: center;
      margin-bottom: 32px;
      color: #a0b5d0;
      font-size: 14px;
      font-weight: 400;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #b0c8e0;
    }
    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(10, 20, 35, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 18px;
      color: white;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
      box-sizing: border-box;
      font-family: inherit;
    }
    .input-group input:focus {
      border-color: #3b82f6;
      background: rgba(20, 40, 70, 0.7);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    .input-group input::placeholder {
      color: #7a8aa0;
    }
    .role-selector {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .role-btn {
      flex: 1;
      padding: 8px 0;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 30px;
      color: #b0c8e0;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      backdrop-filter: blur(4px);
    }
    .role-btn.active {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
      box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border: none;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      margin-top: 24px;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
    }
    .login-btn:hover {
      transform: scale(1.01);
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.5);
    }
    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: #7a8aa0;
    }
    .login-footer a {
      color: #a0c0ff;
      text-decoration: none;
    }
    @media (max-width: 600px) {
      .login-panel {
        width: 90%;
        padding: 28px 20px;
      }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="canvas-container"></div>
  <div class="login-wrapper">
    <div class="login-panel">
      <h2>Sputnik Studio</h2>
      <div class="subtitle">проектирование AV-систем</div>
      
      <div class="input-group">
        <label>Логин</label>
        <input type="text" id="username" placeholder="инженер / pm / директор" value="engineer">
      </div>
      <div class="input-group">
        <label>Пароль</label>
        <input type="password" id="password" placeholder="••••••••" value="demo">
      </div>
      <div class="input-group">
        <label>Роль (демо)</label>
        <div class="role-selector" id="role-selector">
          <div class="role-btn active" data-role="engineer">🔧 Инженер</div>
          <div class="role-btn" data-role="pm">📋 ГИП</div>
          <div class="role-btn" data-role="director">👑 Директор</div>
        </div>
      </div>
      
      <button class="login-btn" id="login-button">Войти в систему</button>
      <div class="login-footer">
        <span>Демо-режим · </span>
        <a href="#" id="skip-login">Пропустить вход</a>
      </div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    
    // --- Инициализация сцены ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(15, 8, 25);
    camera.lookAt(0, 0, 0);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
    controls.enableZoom = true;
    controls.zoomSpeed = 1.5;
    controls.rotateSpeed = 0.8;
    controls.enablePan = true;
    controls.maxPolarAngle = Math.PI / 1.8;
    controls.minDistance = 8;
    controls.maxDistance = 60;
    controls.target.set(0, 1, 0); // Центр сцены, Земля смещена относительно него

    // --- Освещение (реалистичное) ---
    const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.5);
    sunLight.position.set(20, 25, 10);
    sunLight.castShadow = true;
    sunLight.receiveShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    const d = 25;
    sunLight.shadow.camera.left = -d;
    sunLight.shadow.camera.right = d;
    sunLight.shadow.camera.top = d;
    sunLight.shadow.camera.bottom = -d;
    sunLight.shadow.camera.near = 1;
    sunLight.shadow.camera.far = 80;
    sunLight.shadow.bias = -0.0005;
    scene.add(sunLight);
    
    const fillLight = new THREE.AmbientLight(0x404c66, 0.65);
    scene.add(fillLight);
    
    const backLight = new THREE.DirectionalLight(0x99aacc, 0.35);
    backLight.position.set(-15, 10, -20);
    scene.add(backLight);
    
    const rimLight = new THREE.DirectionalLight(0xccddff, 0.25);
    rimLight.position.set(-5, 5, 25);
    scene.add(rimLight);

    // --- Галактика и звёзды ---
    function createGalaxy() {
      const geometry = new THREE.BufferGeometry();
      const count = 6000;
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      const innerColor = new THREE.Color(0xaaccff);
      const outerColor = new THREE.Color(0x5577aa);
      for (let i = 0; i < count; i++) {
        const radius = 50 + Math.random() * 80;
        const spin = radius * 0.03;
        const angle = (i % 400) * 0.06 + spin;
        const height = (Math.random() - 0.5) * 20 * Math.sin(radius * 0.05);
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const y = height;
        positions[i*3] = x;
        positions[i*3+1] = y;
        positions[i*3+2] = z;
        const mixColor = innerColor.clone().lerp(outerColor, radius / 130);
        colors[i*3] = mixColor.r;
        colors[i*3+1] = mixColor.g;
        colors[i*3+2] = mixColor.b;
      }
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      const material = new THREE.PointsMaterial({ size: 0.5, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
      return new THREE.Points(geometry, material);
    }
    const galaxy = createGalaxy();
    galaxy.rotation.x = 0.3;
    galaxy.rotation.y = 0.5;
    scene.add(galaxy);
    
    const starsGeometry = new THREE.BufferGeometry();
    const starsCount = 5000;
    const starsPositions = new Float32Array(starsCount * 3);
    for (let i = 0; i < starsCount * 3; i += 3) {
      const r = 200 + Math.random() * 300;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos((Math.random() * 2) - 1);
      starsPositions[i] = Math.sin(phi) * Math.cos(theta) * r;
      starsPositions[i+1] = Math.sin(phi) * Math.sin(theta) * r;
      starsPositions[i+2] = Math.cos(phi) * r;
    }
    starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
    const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.3, transparent: true});
    const stars = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(stars);

    // --- Земля (смещена влево) ---
    const earthGroup = new THREE.Group();
    const textureLoader = new THREE.TextureLoader();
    const earthMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
    const earthSpecularMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
    const earthNormalMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
    const cloudMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
    
    const earthMaterial = new THREE.MeshPhongMaterial({
      map: earthMap, specularMap: earthSpecularMap, specular: new THREE.Color(0x333333),
      shininess: 10, normalMap: earthNormalMap, normalScale: new THREE.Vector2(1.5, 1.5)
    });
    const earthMesh = new THREE.Mesh(new THREE.SphereGeometry(3.0, 64, 64), earthMaterial);
    earthMesh.castShadow = true; earthMesh.receiveShadow = true;
    earthGroup.add(earthMesh);
    
    const cloudMaterial = new THREE.MeshPhongMaterial({
      map: cloudMap, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending,
      depthWrite: false, side: THREE.DoubleSide
    });
    const cloudMesh = new THREE.Mesh(new THREE.SphereGeometry(3.03, 64, 64), cloudMaterial);
    earthGroup.add(cloudMesh);
    
    const atmosGeo = new THREE.SphereGeometry(3.2, 64, 64);
    const atmosMat = new THREE.MeshPhongMaterial({ 
      color: 0x88aacc, transparent: true, opacity: 0.18, side: THREE.BackSide,
      emissive: new THREE.Color(0x88aaff), emissiveIntensity: 0.4
    });
    const atmosphere = new THREE.Mesh(atmosGeo, atmosMat);
    earthGroup.add(atmosphere);
    
    earthGroup.position.set(-8, 1.5, -4);
    scene.add(earthGroup);

    // --- Спутник ---
    const satellite = new THREE.Group();
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.8, metalness: 0.05 });
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 12), bodyMat);
    body.castShadow = true; body.receiveShadow = true;
    satellite.add(body);
    
    const detailMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.7 });
    const cyl1 = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.25), detailMat);
    cyl1.position.set(0.25, 0.35, 0.35); cyl1.rotation.x = 0.3; cyl1.castShadow = true;
    satellite.add(cyl1);
    const cyl2 = cyl1.clone();
    cyl2.position.set(-0.25, 0.35, -0.35); cyl2.rotation.x = -0.2;
    satellite.add(cyl2);
    
    const antennaMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.5 });
    const antennaBase = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.4), antennaMat);
    antennaBase.position.set(0.35, 0.6, 0.25); antennaBase.rotation.z = 0.1; antennaBase.rotation.x = -0.2; antennaBase.castShadow = true;
    satellite.add(antennaBase);
    const antennaBall = new THREE.Mesh(new THREE.SphereGeometry(0.07), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: new THREE.Color(0x335577), emissiveIntensity: 0.3 }));
    antennaBall.position.set(0.55, 0.8, 0.4); antennaBall.castShadow = true;
    satellite.add(antennaBall);
    
    function createSolarPanel(sign) {
      const group = new THREE.Group();
      const frameMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.7 });
      const frame = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.03, 0.9), frameMat);
      frame.castShadow = true; frame.receiveShadow = true;
      group.add(frame);
      const cellMat = new THREE.MeshStandardMaterial({ color: 0x99aacc, roughness: 0.8, emissive: new THREE.Color(0x224466), emissiveIntensity: 0.1 });
      const cellWidth = 0.4; const cellDepth = 0.35; const gap = 0.06;
      for (let i = -1; i <= 1; i+=2) {
        for (let j = -0.6; j <= 0.6; j+=0.6) {
          const cell = new THREE.Mesh(new THREE.BoxGeometry(cellWidth, 0.02, cellDepth), cellMat);
          cell.position.set(i * (cellWidth/2 + gap), 0.03, j * (cellDepth/2 + gap*0.5));
          cell.castShadow = true; cell.receiveShadow = true;
          group.add(cell);
        }
      }
      const armMat = new THREE.MeshStandardMaterial({ color: 0xbbbbbb, roughness: 0.6 });
      const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.7), armMat);
      arm.rotation.z = Math.PI/2; arm.position.set(sign * 0.7, 0.0, 0); arm.castShadow = true; arm.receiveShadow = true;
      group.add(arm);
      group.position.set(sign * 1.2, 0.15, 0);
      return group;
    }
    satellite.add(createSolarPanel(-1));
    satellite.add(createSolarPanel(1));
    satellite.position.set(-4, 2.5, 1);
    satellite.rotation.y = 0.5; satellite.rotation.x = 0.1;
    scene.add(satellite);

    // --- Луна ---
    const moonMap = textureLoader.load('https://threejs.org/examples/textures/planets/moon_1024.jpg');
    const moon = new THREE.Mesh(new THREE.SphereGeometry(1.1, 48, 32), new THREE.MeshStandardMaterial({ map: moonMap, roughness: 0.95 }));
    moon.castShadow = true; moon.receiveShadow = true;
    scene.add(moon);

    // --- Анимация ---
    const clock = new THREE.Clock();
    
    function animate() {
      const delta = clock.getDelta();
      const elapsedTime = performance.now() * 0.001;
      
      earthGroup.rotation.y += 0.001;
      earthGroup.children[1].rotation.y += 0.0015;
      
      const earthPos = earthGroup.position;
      
      // Спутник
      const satOrbitRadius = 8.0;
      const satOrbitSpeed = 0.15;
      satellite.position.x = earthPos.x + Math.cos(elapsedTime * satOrbitSpeed) * satOrbitRadius;
      satellite.position.z = earthPos.z + Math.sin(elapsedTime * satOrbitSpeed) * satOrbitRadius * 0.7;
      satellite.position.y = earthPos.y + 1.2 + Math.sin(elapsedTime * 0.6) * 0.6;
      satellite.rotation.y = elapsedTime * 0.12;
      satellite.rotation.x = 0.15 + Math.sin(elapsedTime * 0.2) * 0.05;
      
      // Луна
      const moonOrbitRadius = 12.0;
      const moonOrbitSpeed = 0.05;
      moon.position.x = earthPos.x + Math.cos(elapsedTime * moonOrbitSpeed) * moonOrbitRadius;
      moon.position.z = earthPos.z + Math.sin(elapsedTime * moonOrbitSpeed) * moonOrbitRadius * 0.8;
      moon.position.y = earthPos.y + 0.8 + Math.sin(elapsedTime * 0.1) * 0.4;
      moon.rotation.y += 0.002;
      
      galaxy.rotation.y += 0.0001;
      stars.rotation.y -= 0.00005;
      
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Логика входа ---
    const roleButtons = document.querySelectorAll('.role-btn');
    let selectedRole = 'engineer';
    roleButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        roleButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedRole = btn.dataset.role;
      });
    });
    
    function doLogin() {
      const username = document.getElementById('username').value.trim();
      localStorage.setItem('userName', username || 'Инженер');
      localStorage.setItem('userRole', selectedRole);
      window.location.href = '/reactflow/';
    }
    
    document.getElementById('login-button').addEventListener('click', doLogin);
    document.getElementById('skip-login').addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.setItem('userName', 'Гость');
      localStorage.setItem('userRole', 'engineer');
      window.location.href = '/reactflow/';
    });
    
    document.getElementById('password').addEventListener('keypress', (e) => {
      if(e.key === 'Enter') doLogin();
    });
    document.getElementById('username').addEventListener('keypress', (e) => {
      if(e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
